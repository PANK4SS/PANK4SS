name: Update Streak Stats

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  update-streak:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download streak SVG
        run: |
          curl -sL "https://streak-stats.demolab.com/?user=PANK4SS&theme=transparent&hide_border=true&background=00000000&stroke=936CD6&ring=936CD6&fire=936CD6&currStreakLabel=936CD6&sideNums=936CD6&currStreakNum=936CD6&sideLabels=936CD6&dates=936CD6" -o profile/streak.svg

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add profile/streak.svg
          git diff --staged --quiet || git commit -m "Update streak stats"
          git push
