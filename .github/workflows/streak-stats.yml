name: Update Streak Stats

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  update-streak:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download streak SVG
        run: |
          curl -sL -H "User-Agent: Mozilla/5.0" \
            "https://streak-stats.demolab.com/?user=PANK4SS&theme=transparent&hide_border=true&background=00000000&stroke=FECE00&ring=FECE00&fire=FECE00&currStreakLabel=FECE00&sideNums=FECE00&currStreakNum=FECE00&sideLabels=FECE00&dates=FECE00" \
            -o profile/streak.svg

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add profile/streak.svg
          git diff --staged --quiet || git commit -m "Update streak stats"
          git push
