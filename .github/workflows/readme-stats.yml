name: Update README Cards

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Stats card (dark mode)
        run: |
          curl -sL -H "User-Agent: Mozilla/5.0" "https://github-readme-stats-iota-ebon-40.vercel.app/api?username=PANK4SS&show_icons=true&hide_border=true&bg_color=00000000&title_color=FFFFFF&icon_color=FFFFFF&text_color=FFFFFF" -o profile/stats-dark.svg

      - name: Stats card (light mode)
        run: |
          curl -sL -H "User-Agent: Mozilla/5.0" "https://github-readme-stats-iota-ebon-40.vercel.app/api?username=PANK4SS&show_icons=true&hide_border=true&bg_color=00000000&title_color=000000&icon_color=000000&text_color=000000" -o profile/stats-light.svg

      - name: Top languages (dark mode)
        run: |
          curl -sL -H "User-Agent: Mozilla/5.0" "https://github-readme-stats-iota-ebon-40.vercel.app/api/top-langs/?username=PANK4SS&layout=compact&hide_border=true&bg_color=00000000&title_color=FFFFFF&text_color=FFFFFF&langs_count=8" -o profile/top-langs-dark.svg

      - name: Top languages (light mode)
        run: |
          curl -sL -H "User-Agent: Mozilla/5.0" "https://github-readme-stats-iota-ebon-40.vercel.app/api/top-langs/?username=PANK4SS&layout=compact&hide_border=true&bg_color=00000000&title_color=000000&text_color=000000&langs_count=8" -o profile/top-langs-light.svg

      - name: Commit cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git diff --staged --quiet || git commit -m "Update README cards"
          git push
