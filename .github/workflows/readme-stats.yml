name: Update README Cards

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download stats SVG
        run: |
          curl -sL "https://github-readme-stats.vercel.app/api?username=PANK4SS&show_icons=true&hide_border=true&background=00000000&title_color=936CD6&icon_color=936CD6&text_color=FFFFFF" -o profile/stats.svg

      - name: Download top languages SVG
        run: |
          curl -sL "https://github-readme-stats.vercel.app/api/top-langs/?username=PANK4SS&layout=compact&hide_border=true&background=00000000&title_color=936CD6&text_color=FFFFFF&langs_count=8" -o profile/top-langs.svg

      - name: Commit cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git diff --staged --quiet || git commit -m "Update README cards"
          git push
