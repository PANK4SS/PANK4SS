name: Update README Cards

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Stats card
        run: |
          curl -sL -H "User-Agent: Mozilla/5.0" \
            "https://github-readme-stats-iota-ebon-40.vercel.app/api?username=PANK4SS&show_icons=true&hide_border=true&bg_color=00000000&title_color=FECE00&icon_color=FECE00&text_color=FECE00" \
            -o profile/stats.svg

      - name: Top languages
        run: |
          curl -sL -H "User-Agent: Mozilla/5.0" \
            "https://github-readme-stats-iota-ebon-40.vercel.app/api/top-langs/?username=PANK4SS&layout=compact&hide_border=true&bg_color=00000000&title_color=FECE00&text_color=FECE00&langs_count=8" \
            -o profile/top-langs.svg

      - name: Commit cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add profile/stats.svg profile/top-langs.svg
          git diff --staged --quiet || git commit -m "Update README cards"
          git push
